baseURL = "https://wunianor.github.io/"
title = "wunianor"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
enableRobotsTXT = true

[taxonomies]
tag = "tags"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]

[sitemap]
changefreq = "weekly"
priority = 0.5

[params]
site_name = "wunianor"
description = "个人技术学习与项目记录"
images = ["/images/og-default.png"]
clarity_id = "x1kufg0n6z"
offlineSearch = true
offlineSearchMaxResults = 10
offlineSearchSummaryLength = 100

[params.giscus]
repo = "wunianor/wunianor.github.io"
repo_id = "R_kgDORaIfTQ"
category = "Announcements"
category_id = "DIC_kwDORaIfTc4C-eIo"

[params.Taxonomy]
taxonomyPageHeader = ["tags"]
taxonomyCloud = ["tags"]
taxonomyCloudTitle = ["标签"]

[params.ui]
navbar_logo = false
footer_about_enable = true

[module]
proxy = "direct"

[module.hugoVersion]
extended = true
min = "0.110.0"

[[module.imports]]
path = "github.com/google/docsy/theme"
disable = false

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = "pygments"
lineNos = true
lineNumbersInTable = false
noClasses = false

[markup.tableOfContents]
startLevel = 2
endLevel = 4

[params.notes.categories]
cpp = "C++"
go = "Go"
linux = "Linux"
mysql = "MySQL"

[params.blog.categories]
meta = "站点"

[params.projects.names]
hugo-site = "个人站点"
