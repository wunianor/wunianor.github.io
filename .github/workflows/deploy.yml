# M2: Build Hugo (Docsy + PostCSS) and deploy to GitHub Pages via official artifact flow.
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install PostCSS dependencies
        run: npm ci

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.162.1"
          extended: true

      # Merge config/production/hugo.toml over _default (not committed; values from GitHub Secrets).
      - name: Write production config from secrets
        env:
          CLARITY_ID: ${{ secrets.CLARITY_ID }}
          GISCUS_REPO: ${{ secrets.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ secrets.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ secrets.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ secrets.GISCUS_CATEGORY_ID }}
        run: |
          mkdir -p config/production
          {
            echo '[params]'
            if [ -n "$CLARITY_ID" ]; then
              printf 'clarity_id = %q\n' "$CLARITY_ID"
            fi
            echo
            echo '[params.giscus]'
            if [ -n "$GISCUS_REPO" ]; then
              printf 'repo = %q\n' "$GISCUS_REPO"
            fi
            if [ -n "$GISCUS_REPO_ID" ]; then
              printf 'repo_id = %q\n' "$GISCUS_REPO_ID"
            fi
            if [ -n "$GISCUS_CATEGORY" ]; then
              printf 'category = %q\n' "$GISCUS_CATEGORY"
            fi
            if [ -n "$GISCUS_CATEGORY_ID" ]; then
              printf 'category_id = %q\n' "$GISCUS_CATEGORY_ID"
            fi
          } > config/production/hugo.toml
          echo '--- config/production/hugo.toml (keys only) ---'
          grep -E '^(clarity_id|repo|repo_id|category|category_id) =' config/production/hugo.toml | sed 's/= .*/= ***/' || true

      - name: Build site
        run: hugo --minify --environment production

      # M13 optional: HTMLProofer dead-link check (enable after first deploy to GitHub Pages)
      # - name: Check links with HTMLProofer
      #   uses: ruby/setup-ruby@v1
      #   with:
      #     ruby-version: "3.3"
      # - run: gem install html-proofer
      # - run: htmlproofer public --assume-extension --check-external-hash --disable-external

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
